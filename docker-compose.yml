services:
  postgres:
    image: postgres:16
    container_name: coolstuff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: coolstuff
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Set POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: coolstuff-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD?Set POSTGRES_PASSWORD}@postgres:5432/coolstuff
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
