services:
  postgres:
    image: postgres:16
    container_name: coolstuff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: coolstuff
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Set POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
